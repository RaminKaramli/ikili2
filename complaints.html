<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <!-- Təməl viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- Zoom meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Şikayət və Təkliflər | ikili2.az</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="stylesheet" href="assets/css/style.css?v=20260314" />
</head>

<body class="page">
    <div class="page--complaints">
        <div id="header-placeholder"></div>
        <script>
            (function () {
                const url = "./assets/components/header.html";
                const cacheKey = `partial:${url}`;
                const node = document.getElementById("header-placeholder");
                if (!node) return;

                try {
                    const cached = localStorage.getItem(cacheKey);
                    if (cached) node.innerHTML = cached;
                } catch (error) {
                    console.warn("Header preload cache error:", error);
                }

                if (window.location.protocol === "file:") return;

                fetch(url)
                    .then((response) => {
                        if (!response.ok) throw new Error(`Header yüklənmədi: ${response.status}`);
                        return response.text();
                    })
                    .then((html) => {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, "text/html");
                        const nextHtml = doc.body.innerHTML;
                        if (node.innerHTML !== nextHtml) node.innerHTML = nextHtml;
                        try {
                            localStorage.setItem(cacheKey, nextHtml);
                        } catch (error) {
                            console.warn("Header cache write error:", error);
                        }
                    })
                    .catch((error) => {
                        console.warn("Header preload fetch error:", error);
                    });
            })();
        </script>

        <main>
            <section class="complaints-page">
                <div class="complaints-page__container">
                    <nav class="breadcrumb" aria-label="Breadcrumb">
                        <a href="index.html">Ana səhifə</a>
                        <span aria-hidden="true">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M13.5 16L17.5 12L13.5 8" stroke="#5A6268" stroke-width="1.5"
                                    stroke-linecap="round" stroke-linejoin="round" />
                                <path d="M6.5 17L11.5 12L6.5 7" stroke="#5A6268" stroke-width="1.5"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </span>
                        <a href="complaints.html" aria-current="page">Şikayət və təkliflər</a>
                        <span aria-hidden="true">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M13.5 16L17.5 12L13.5 8" stroke="#5A6268" stroke-width="1.5"
                                    stroke-linecap="round" stroke-linejoin="round" />
                                <path d="M6.5 17L11.5 12L6.5 7" stroke="#5A6268" stroke-width="1.5"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </span>
                    </nav>

                    <div class="section-header">
                        <h2 class="section-header__title">Şikayət və təkliflər</h2>
                    </div>

                    <form class="complaints-form" action="#" method="post">
                        <div class="complaints-form__panel">
                            <div class="contact-form__row">
                                <div class="contact-form__group">
                                    <label class="contact-form__label" for="complaintFullName">Ad soyad</label>
                                    <input class="contact-form__input" id="complaintFullName" name="complaintFullName"
                                        type="text" placeholder="Ad soyad" required>
                                </div>
                                <div class="contact-form__group">
                                    <label class="contact-form__label" for="complaintPhone">Əlaqə nömrəsi</label>
                                    <input class="contact-form__input" id="complaintPhone" name="complaintPhone"
                                        type="tel" placeholder="Əlaqə nömrəsi" required>
                                </div>
                            </div>

                            <div class="contact-form__group">
                                <label class="contact-form__label" for="complaintMessage">Şikayətiniz /
                                    Təklifiniz</label>
                                <textarea class="contact-form__textarea" id="complaintMessage" name="complaintMessage"
                                    placeholder="" required></textarea>
                            </div>

                            <div class="complaints-form__footer">
                                <button class="complaints-form__submit" type="submit">Göndər</button>
                            </div>
                        </div>
                    </form>
                </div>
            </section>
        </main>

        <div id="footer-placeholder"></div>
        <script>
            (function () {
                const url = "./assets/components/footer.html";
                const cacheKey = `partial:${url}`;
                const node = document.getElementById("footer-placeholder");
                if (!node) return;

                try {
                    const cached = localStorage.getItem(cacheKey);
                    if (cached) node.innerHTML = cached;
                } catch (error) {
                    console.warn("Footer preload cache error:", error);

                if (window.location.protocol === "file:") return;

                fetch(url)
                    .then((response) => {
                        if (!response.ok) throw new Error(`Footer yüklənmədi: ${response.status}`);
                        return response.text();
                    })
                    .then((html) => {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, "text/html");
                        const nextHtml = doc.body.innerHTML;
                        if (node.innerHTML !== nextHtml) node.innerHTML = nextHtml;
                        try {
                            localStorage.setItem(cacheKey, nextHtml);
                        } catch (error) {
                            console.warn("Footer cache write error:", error);
                        }
                    })
                    .catch((error) => {
                        console.warn("Footer preload fetch error:", error);
                    });
            })();
        </script>

        <script type="module" src="assets/js/main.js?v=20260314"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    </div>
</body>
