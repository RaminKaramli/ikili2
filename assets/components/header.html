<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
</head>

<body>
    <!-- * HEADER * -->
    <header class="header">
        <div class="header__inner">

            <a class="header__logo" href="#">
                <img class="header__logo-img" src="assets/images/logo.png" alt="İkiliiki logo">
            </a>

            <button class="header__products" id="openMega" type="button" aria-expanded="false" aria-controls="megaMenu">
                <svg class="header__products-icon header__products-icon--menu" width="24px" height="24px"
                    viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g>
                        <path d="M4 18L20 18" stroke="#ffffff" stroke-width="2" stroke-linecap="round"></path>
                        <path d="M4 12L20 12" stroke="#ffffff" stroke-width="2" stroke-linecap="round"></path>
                        <path d="M4 6L20 6" stroke="#ffffff" stroke-width="2" stroke-linecap="round"></path>
                    </g>
                </svg>

                <svg class="header__products-icon header__products-icon--close" viewBox="0 0 24 24" fill="none"
                    aria-hidden="true">
                    <path d="M6 6L18 18M6 18L18 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                </svg>

                <span>Məhsullar</span>
            </button>

            <div class="header__search">
                <input class="header__search-input" type="text" placeholder="Axtarış..." />
                <button class="header__search-btn" type="button" aria-label="Axtar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M15.7138 6.8382C18.1647 9.28913 18.1647 13.2629 15.7138 15.7138C13.2629 18.1647 9.28913 18.1647 6.8382 15.7138C4.38727 13.2629 4.38727 9.28913 6.8382 6.8382C9.28913 4.38727 13.2629 4.38727 15.7138 6.8382"
                            stroke="#010203" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M19 19L15.71 15.71" stroke="#010203" stroke-width="1.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>

            <nav class="header__nav">
                <a class="header__nav-link" href="#">Haqqımızda</a>
                <a class="header__nav-link" href="#">Bloq</a>
            </nav>

            <button class="header__lang" type="button">
                <svg width="24px" height="24px" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"
                    aria-hidden="true" role="img" preserveAspectRatio="xMidYMid meet" fill="#000000">
                    <path fill="#E00034" d="M0 13h36v10H0z"></path>
                    <path fill="#0098C3" d="M32 5H4a4 4 0 0 0-4 4v4h36V9a4 4 0 0 0-4-4z"></path>
                    <g fill="#FFF">
                        <path
                            d="M17.844 21.333a3.333 3.333 0 1 1 2.475-5.565a4 4 0 1 0 .001 4.464a3.325 3.325 0 0 1-2.476 1.101z">
                        </path>
                        <path
                            d="M23.667 17.998l-1.196-.424l.544-1.146l-1.146.545l-.426-1.195l-.424 1.196l-.003-.002l-1.144-.542l.546 1.146l-1.196.426l1.196.424l-.544 1.146l1.141-.543l.005-.002l.426 1.195l.424-1.196l1.147.544l-.546-1.146z">
                        </path>
                    </g>
                    <path fill="#00AE65" d="M4 31h28a4 4 0 0 0 4-4v-4H0v4a4 4 0 0 0 4 4z"></path>
                </svg>

                <span>Azərbaycan dili</span>

                <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
                    <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>

            <a class="header__phone" href="tel:0773339889">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd"
                        d="M10.8561 13.144C9.68615 11.974 8.80415 10.664 8.21815 9.33499C8.09415 9.05399 8.16715 8.72499 8.38415 8.50799L9.20315 7.68999C9.87415 7.01899 9.87415 6.06999 9.28815 5.48399L8.11415 4.30999C7.33315 3.52899 6.06715 3.52899 5.28615 4.30999L4.63415 4.96199C3.89315 5.70299 3.58415 6.77199 3.78415 7.83199C4.27815 10.445 5.79615 13.306 8.24515 15.755C10.6941 18.204 13.5551 19.722 16.1681 20.216C17.2281 20.416 18.2971 20.107 19.0381 19.366L19.6891 18.715C20.4701 17.934 20.4701 16.668 19.6891 15.887L18.5161 14.714C17.9301 14.128 16.9801 14.128 16.3951 14.714L15.4921 15.618C15.2751 15.835 14.9461 15.908 14.6651 15.784C13.3361 15.197 12.0261 14.314 10.8561 13.144Z"
                        stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                077-333-98-89
            </a>

        </div>
    </header>

    <div class="mega" id="megaMenu" role="dialog" aria-label="Məhsul kateqoriyaları">
        <div class="mega__overlay" id="megaOverlay"></div>

        <div class="mega__panel" id="megaPanel">
            <div class="mega__left" id="categories" role="menu"></div>

            <div class="mega__center" id="megaCenter">
                <div id="subcategories"></div>
            </div>

            <aside class="mega__right">
                <div class="deal" id="megaDeal"></div>
            </aside>
        </div>
    </div>

</body>

</html>
